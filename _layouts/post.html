---
layout: default
---

<article class="post">
  <header>
    <h1>{{ page.title }}</h1>
    <p class="post-date">{{ page.date | date: "%B %d, %Y" }}</p>
  </header>

  {% include toc.html %}

  <section class="post-content">
    {{ content }}
  </section>

  <footer class="post-tags">
    {% if page.tags %}
      <p><strong>Tags:</strong>
      {% for tag in page.tags %}
        <span class="tag">{{ tag }}</span>
      {% endfor %}
      </p>
    {% endif %}
  </footer>
</article>

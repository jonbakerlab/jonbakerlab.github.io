# =========================
# Site identity (keep at top)
# =========================
title: "The Baker Lab"
tagline: "Oral microbiome · Virome · Long-read & multi-omics"
description: >
  We study how the oral microbiome impacts human health using sequencing,
  mass spectrometry, bioinformatics, and molecular biology.
url: "https://jonbakerlab.github.io"   # no trailing slash

logo: "./assets/images/OHSU-RGB-4C-REV-small.png"
author: "Jonathon L. Baker, Ph.D."
lang: "en"
permalink: "/:title/"
excerpt_separator: "\n\n\n"
date_format: "%B %d, %Y"

# Social / Open Graph
social:
  twitter: "jonbakerlab"
  github: "jonbakerlab"
  image: "/images/share.jpg"   # upload a matching image file to /images

# Markdown / rendering
markdown: kramdown

# =========================
# Layout / theme options
# =========================
show_excerpts: false        # show article excerpts on the home page
show_frame: false           # adds a gray frame to the site
show_sidebar: false         # show a sidebar instead of the usual header
minimal: true               # use a dark header

# =========================
# Navigation
# =========================
# accepts {file, title, url, icon, sidebaricon}
navigation:
  - { file: "index.html" }
  - { file: "./about/index.md",         title: "Our Research",  url: "https://jonbakerlab.github.io/about/" }
  - { file: "./lab-members/index.md",   title: "Our Team",      url: "https://jonbakerlab.github.io/lab-members/" }
  - { file: "./publications/index.md",  title: "Publications",  url: "https://jonbakerlab.github.io/publications/" }
  - { file: "./_posts/2024-05-01-welcome-to-the-baker-lab.md", title: "Blog", url: "https://jonbakerlab.github.io/blog/" }

# Footer social links (Font Awesome icon names)
external:
  - { title: "Mail",     icon: envelope,          url: "mailto:bakerjo@ohsu.edu" }
  - { title: "GitHub",   icon: github,            url: "https://github.com/jonbakerlab" }
  - { title: "Twitter",  icon: twitter,           url: "https://twitter.com/jonbakerlab" }
  - { title: "BlueSky",  icon: square-bluesky,    url: "https://bsky.app/profile/jonbakerlab.bsky.social" }

# =========================
# Comments (optional)
# =========================
comments:
  # disqus_shortname: ""
  # isso_domain: ""

# =========================
# Plugins (keep to those supported by GitHub Pages)
# =========================
plugins:
  - jekyll-feed
